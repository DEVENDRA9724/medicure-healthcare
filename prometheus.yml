global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'medicure-monitor'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Rule files for alerts
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Scrape Medicure Spring Boot Application
  - job_name: 'medicure-app'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'medicure-healthcare'
          environment: 'production'
          service: 'doctor-api'

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'

  # Scrape node metrics (if needed)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']